<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SMB AI Affiliate Card</title>
  <link rel="stylesheet" href="partner-widget.css">
  <script src="partner-config.js" defer></script>
  <script src="partner-widget.js" defer></script>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
    }
    .smb-ai-builder-embed-wrapper {
      padding: 8px; /* very compact padding for card */
    }
  </style>
</head>
<body>
  <div class="smb-ai-builder-embed-wrapper">
    <div class="smb-ai-affiliate-card">
      <div class="smb-ai-badge">Workflow readiness tool</div>
      <h2>Stop automating broken workflows.</h2>
      <p>Audit one SMB process and build a safer AI agent pilot plan.</p>

      <div class="smb-ai-actions">
        <a id="smb-ai-primary-cta" href="javascript:void(0)" class="smb-ai-btn smb-ai-btn-primary" target="_blank" rel="noopener noreferrer">Launch Workflow Audit</a>
        <a id="smb-ai-secondary-cta" href="javascript:void(0)" class="smb-ai-btn smb-ai-btn-secondary" style="font-size: 0.8rem; padding: 10px;" target="_blank" rel="noopener noreferrer">View Builder Resource</a>
      </div>

      <div class="smb-ai-footer">
        <div class="smb-ai-attribution" id="smb-ai-attribution-name">Shared by SMB AI Builder</div>
        <div class="smb-ai-disclaimer" style="font-size: 0.65rem;">
          For planning support only. Sensitive business decisions need qualified human review.
        </div>
      </div>
    </div>
  </div>
</body>
</html>
